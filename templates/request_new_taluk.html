<!DOCTYPE html>
<html>
<head>
    <title>Request New Taluk</title>
    <style>
        body {
            background: #0f0f0f;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 40px;
        }

        .card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            border-left: 5px solid #ff6a00;
            max-width: 500px;
            margin: auto;
            text-align: center;
        }

        h2 {
            color: #ff6a00;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #2a2a2a;
            border: none;
            border-radius: 6px;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff6a00;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .success-msg {
            background: #002b1a;
            padding: 15px;
            border-radius: 6px;
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .error-msg {
            background: #330000;
            padding: 15px;
            border-radius: 6px;
            color: #ff3b3b;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            color: #ff6a00;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Request New Taluk</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success-msg">{{ success }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="taluk_name" placeholder="Enter Taluk Name" required>
        <input type="text" name="district" placeholder="Enter District (e.g. Dakshina Kannada)" required>
        <button type="submit">Submit Taluk Request</button>
    </form>

    <a href="/dashboard/" class="back-btn">← Back to Dashboard</a>
</div>

</body>
</html>
